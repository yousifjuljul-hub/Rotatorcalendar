<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="application-name" content="جدول الخفارات">
<meta name="description" content="جدول خفارات كافية بلس">
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="خفارات">
<link rel="apple-touch-icon" href="icons/icon-152x152.png">
<link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192x192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192x192.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f1117">
<title>جدول الخفارات — كافية بلس</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<style>
/* DARK */
:root{
  --bg:#0f1117;--bg1:#181c27;--bg2:#1f2437;--bg3:#252c42;
  --card:#232840;--border:#2d3553;--border2:#3d4870;
  --tx:#e8eaf6;--tx2:#9aa5cc;--tx3:#5a6890;--shadow:rgba(0,0,0,.3);
  --cream:#f5c97a;--cream2:#e8a84a;--lcream:rgba(245,201,122,.12);
  --er-am:#60b8e8;--er-pm:#ff8c69;--er-night:#a78bfa;
  --consult:#f5c97a;--present:#7ec8a4;--call24:#4ecdc4;
  --tog-bg:#2d3553;
}
/* LIGHT */
body.light{
  --bg:#f0f4f8;--bg1:#ffffff;--bg2:#e8edf5;--bg3:#dde3ef;
  --card:#ffffff;--border:#cbd5e8;--border2:#a8b8d8;
  --tx:#1a2040;--tx2:#4a5580;--tx3:#8a95b8;--shadow:rgba(0,0,0,.07);
  --cream:#b86800;--cream2:#904e00;--lcream:rgba(184,104,0,.1);
  --er-am:#1a7ab8;--er-pm:#c05020;--er-night:#6b4cc0;
  --consult:#b07000;--present:#2a8060;--call24:#0a9990;
  --tog-bg:#dde3ef;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:'Tajawal',Arial,sans-serif;color:var(--tx);transition:background .25s,color .25s;}
#app{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto;}

/* TOPBAR */
.topbar{background:var(--bg);border-bottom:1px solid var(--border);padding:8px 12px;display:flex;align-items:center;gap:10px;flex-shrink:0;transition:background .25s,border-color .25s;}
.logo-wrap{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.logo-plus{
  width:36px;height:36px;border-radius:50%;
  background:#f5c97a;
  color:#0b0f1a;font-size:24px;font-weight:900;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;line-height:1;
  font-family:'Tajawal',Arial,sans-serif;
}
.logo-text-wrap{display:flex;flex-direction:column;gap:2px;flex-shrink:0;}
.logo-name{font-size:15px;font-weight:900;color:var(--tx);white-space:nowrap;letter-spacing:.2px;}
.logo-sub-title{font-size:10px;font-weight:600;color:var(--cream);white-space:nowrap;}
.logo-subtitle{display:none !important;}
.tb-space{flex:1;}

/* Toggle */
.theme-tog{display:flex;align-items:center;gap:5px;cursor:pointer;padding:5px 9px;border-radius:20px;background:var(--tog-bg);border:1px solid var(--border);user-select:none;}
.tog-icon{font-size:12px;}
.tog-track{width:32px;height:17px;border-radius:9px;background:var(--border2);position:relative;transition:background .25s;flex-shrink:0;}
body.light .tog-track{background:#00b4a6;}
.tog-knob{width:13px;height:13px;border-radius:50%;background:#fff;position:absolute;top:2px;right:2px;transition:transform .25s;box-shadow:0 1px 4px rgba(0,0,0,.3);}
body.light .tog-knob{transform:translateX(-15px);}

.tb-btn{width:34px;height:34px;border-radius:9px;background:var(--bg2);border:1px solid var(--border);cursor:pointer;font-size:16px;color:var(--tx);display:flex;align-items:center;justify-content:center;transition:background .25s;}
.tb-btn:active{transform:scale(.9);}

/* MONTH NAV */
.month-nav{display:flex;align-items:center;padding:9px 12px;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0;gap:6px;transition:background .25s,border-color .25s;}
.nav-arr{width:32px;height:32px;border-radius:9px;background:var(--bg2);border:1px solid var(--border);cursor:pointer;font-size:17px;color:var(--tx);display:flex;align-items:center;justify-content:center;}
.nav-arr:active{transform:scale(.9);}
.nav-lbl{flex:1;text-align:center;font-size:15px;font-weight:900;color:var(--cream);cursor:pointer;}
.nav-today{padding:5px 10px;border-radius:8px;font-size:10px;font-weight:700;background:var(--lcream);color:var(--cream);border:1px solid rgba(184,104,0,.25);cursor:pointer;font-family:'Tajawal',Arial,sans-serif;}
.nav-today:active{transform:scale(.93);}

/* STATS */
.stats-bar{display:flex;gap:5px;padding:7px 12px;overflow-x:auto;background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0;}
.stats-bar::-webkit-scrollbar{display:none;}
.stat-pill{flex-shrink:0;padding:4px 9px;border-radius:20px;font-size:9px;font-weight:700;display:flex;align-items:center;gap:3px;border:1px solid;}
.stat-num{font-size:10px;font-weight:900;}

/* WEEKDAYS */
.weekdays{display:grid;grid-template-columns:repeat(7,1fr);background:var(--bg);padding:6px 5px 3px;flex-shrink:0;}
.wd{text-align:center;font-size:8.5px;font-weight:800;color:var(--tx3);}
.wd.fri,.wd.sat{color:var(--cream);}

/* CALENDAR */
.cal-wrap{flex:1;overflow-y:auto;padding:0 5px 6px;}
.cal-wrap::-webkit-scrollbar{width:3px;}
.cal-wrap::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px;}
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.day-cell{background:var(--card);border:1px solid var(--border);border-radius:9px;min-height:70px;padding:4px;cursor:pointer;display:flex;flex-direction:column;gap:2px;transition:transform .12s,background .2s;box-shadow:0 1px 3px var(--shadow);}
.day-cell:active{transform:scale(.93);}
.day-cell.empty{background:transparent;border:none;cursor:default;pointer-events:none;box-shadow:none;}
.day-cell.today{border:2px solid var(--cream);background:var(--lcream);}
.day-cell.weekend{background:var(--bg2);}
.day-cell.has-shift{border-color:var(--border2);}
.day-num{font-size:11px;font-weight:800;color:var(--tx);line-height:1;}
.day-cell.today .day-num,.day-cell.weekend .day-num{color:var(--cream);}
.s-tag{font-size:7.5px;font-weight:800;padding:2px 4px;border-radius:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:center;line-height:1.4;}

/* LEGEND */
.legend{display:flex;gap:4px;flex-wrap:wrap;padding:7px 12px;background:var(--bg);border-top:1px solid var(--border);flex-shrink:0;}
.lg-item{display:flex;align-items:center;gap:4px;font-size:9px;font-weight:700;color:var(--tx2);padding:2px 6px;border-radius:7px;background:var(--bg2);border:1px solid var(--border);}
.lg-dot{width:7px;height:7px;border-radius:2px;flex-shrink:0;}

/* OVERLAY */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(6px);z-index:200;align-items:flex-end;justify-content:center;}
.overlay.open{display:flex;}
.sheet{width:100%;max-width:480px;background:var(--bg1);border-radius:22px 22px 0 0;border-top:1px solid var(--border);padding:0 15px max(18px,env(safe-area-inset-bottom));max-height:90vh;overflow-y:auto;animation:up .28s cubic-bezier(.34,1.4,.64,1);transition:background .25s;}
.sheet::-webkit-scrollbar{display:none;}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.s-handle{width:38px;height:4px;border-radius:2px;background:var(--border2);margin:10px auto 12px;}
.s-day-head{display:flex;align-items:center;gap:11px;padding-bottom:11px;border-bottom:1px solid var(--border);margin-bottom:11px;}
.s-day-badge{width:48px;height:48px;border-radius:13px;background:linear-gradient(135deg,var(--cream),var(--cream2));display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--bg1);flex-shrink:0;}
.s-day-big{font-size:18px;font-weight:900;line-height:1;}
.s-day-mo{font-size:8px;font-weight:800;margin-top:1px;}
.s-day-wd{font-size:13px;font-weight:800;color:var(--tx);}
.s-day-dt{font-size:10px;color:var(--tx2);margin-top:2px;}
.s-sec{font-size:10px;font-weight:800;color:var(--cream);margin-bottom:8px;letter-spacing:.4px;text-transform:uppercase;}
.s-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:12px;}
.s-btn{padding:10px 8px;border-radius:10px;border:1.5px solid;background:transparent;cursor:pointer;font-family:'Tajawal',Arial,sans-serif;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;gap:4px;transition:transform .12s;}
.s-btn:active{transform:scale(.93);}
.cur-shifts{margin-bottom:12px;}
.s-row{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:9px 11px;margin-bottom:5px;display:flex;align-items:center;gap:9px;}
.s-dot{width:9px;height:28px;border-radius:4px;flex-shrink:0;}
.s-rinfo{flex:1;}
.s-rname{font-size:12px;font-weight:800;color:var(--tx);}
.s-rnote{font-size:9px;color:var(--tx2);margin-top:1px;}
.s-rdel{width:25px;height:25px;border-radius:7px;border:none;background:rgba(242,139,158,.15);color:#f28b9e;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.note-row{margin-bottom:12px;}
.note-row label{display:block;font-size:9px;font-weight:800;color:var(--tx2);margin-bottom:5px;}
.note-row textarea{width:100%;padding:9px 11px;background:var(--bg2);border:1px solid var(--border);border-radius:9px;color:var(--tx);font-size:12px;font-family:'Tajawal',Arial,sans-serif;outline:none;resize:none;min-height:52px;line-height:1.5;}
.note-row textarea:focus{border-color:var(--cream);}
.s-actions{display:flex;gap:7px;}
.btn-danger{flex:1;padding:10px;border-radius:10px;border:1px solid #f28b9e;background:rgba(242,139,158,.1);color:#f28b9e;font-family:'Tajawal',Arial,sans-serif;font-size:12px;font-weight:800;cursor:pointer;}
.btn-ok{flex:1;padding:10px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--cream),var(--cream2));color:var(--bg1);font-family:'Tajawal',Arial,sans-serif;font-size:12px;font-weight:800;cursor:pointer;}
.mp-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:12px;}
.mp-btn{padding:11px 5px;border-radius:9px;background:var(--bg2);border:1px solid var(--border);color:var(--tx);font-size:11px;font-weight:700;font-family:'Tajawal',Arial,sans-serif;cursor:pointer;}
.mp-btn.cur{background:var(--lcream);border-color:var(--cream);color:var(--cream);}
.yr-nav{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:12px;}
.yr-btn{width:32px;height:32px;border-radius:9px;background:var(--bg2);border:1px solid var(--border);cursor:pointer;font-size:16px;color:var(--tx);}
.yr-num{font-size:17px;font-weight:900;color:var(--cream);}

/* Toast */
#toast{position:fixed;bottom:75px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--bg3);border:1px solid var(--border2);border-radius:11px;padding:9px 16px;font-size:12px;font-weight:700;color:var(--tx);opacity:0;transition:all .3s;pointer-events:none;z-index:999;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* Export loading */
#exp-load{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);z-index:500;align-items:center;justify-content:center;flex-direction:column;gap:14px;}
#exp-load.show{display:flex;}
.spin{width:46px;height:46px;border-radius:50%;border:4px solid var(--border2);border-top-color:var(--cream);animation:spin .75s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.spin-lbl{font-size:14px;font-weight:700;color:var(--tx);}
</style>
</head>
<body>
<div id="app">

  <!-- TOPBAR -->
  <div class="topbar">
    <!-- Logo on RIGHT -->
    <div class="logo-wrap">
      <div class="logo-plus">+</div>
      <div class="logo-text-wrap">
        <div class="logo-name">كافية بلس</div>
        <div class="logo-sub-title">جدول الخفارات</div>
      </div>
    </div>
    <div class="tb-space"></div>
    <!-- Controls on LEFT -->
    <div style="display:flex;align-items:center;gap:7px;flex-shrink:0;">
      <div class="theme-tog" onclick="toggleTheme()">
        <span class="tog-icon" id="tog-icon">🌙</span>
        <div class="tog-track"><div class="tog-knob"></div></div>
      </div>
      <button class="tb-btn" onclick="exportImage()" title="تصدير صورة">🖼️</button>
    </div>
  </div>

  <!-- MONTH NAV -->
  <div class="month-nav">
    <button class="nav-arr" onclick="changeMonth(1)">›</button>
    <div class="nav-lbl" id="month-lbl" onclick="openPicker()">—</div>
    <button class="nav-arr" onclick="changeMonth(-1)">‹</button>
    <button class="nav-today" onclick="goToday()">اليوم</button>
  </div>

  <div class="stats-bar" id="stats-bar"></div>

  <div class="weekdays">
    <div class="wd sat">السبت</div>
    <div class="wd">الأحد</div>
    <div class="wd">الاثنين</div>
    <div class="wd">الثلاثاء</div>
    <div class="wd">الأربعاء</div>
    <div class="wd">الخميس</div>
    <div class="wd fri">الجمعة</div>
  </div>

  <div class="cal-wrap"><div class="calendar" id="cal"></div></div>

  <div class="legend">
    <div class="lg-item"><span class="lg-dot" style="background:#60b8e8;"></span>طوارئ صباحي</div>
    <div class="lg-item"><span class="lg-dot" style="background:#ff8c69;"></span>طوارئ عصري</div>
    <div class="lg-item"><span class="lg-dot" style="background:#a78bfa;"></span>طوارئ نايت</div>
    <div class="lg-item"><span class="lg-dot" style="background:#f5c97a;"></span>استشارية</div>
    <div class="lg-item"><span class="lg-dot" style="background:#7ec8a4;"></span>تواجد</div>
    <div class="lg-item"><span class="lg-dot" style="background:#4ecdc4;"></span>كول 24س</div>
  </div>
</div>

<!-- DAY SHEET -->
<div class="overlay" id="day-ov" onclick="bgClose(event,'day-ov')">
  <div class="sheet">
    <div class="s-handle"></div>
    <div class="s-day-head">
      <div class="s-day-badge"><div class="s-day-big" id="sd-n">—</div><div class="s-day-mo" id="sd-mo">—</div></div>
      <div><div class="s-day-wd" id="sd-wd">—</div><div class="s-day-dt" id="sd-dt">—</div></div>
    </div>
    <div class="s-sec">الخفارات الحالية</div>
    <div class="cur-shifts" id="cur-shifts"></div>
    <div class="s-sec">إضافة خفارة</div>
    <div class="s-grid" id="shift-grid">
      <button class="s-btn" data-type="er-am"    style="border-color:#60b8e8;color:#60b8e8;background:rgba(96,184,232,.08);">🌅 طوارئ صباحي</button>
      <button class="s-btn" data-type="er-pm"    style="border-color:#ff8c69;color:#ff8c69;background:rgba(255,140,105,.08);">🌇 طوارئ عصري</button>
      <button class="s-btn" data-type="er-night" style="border-color:#a78bfa;color:#a78bfa;background:rgba(167,139,250,.08);">🌙 طوارئ نايت</button>
      <button class="s-btn" data-type="consult"  style="border-color:#f5c97a;color:#f5c97a;background:rgba(245,201,122,.08);">🩺 استشارية</button>
      <button class="s-btn" data-type="present"  style="border-color:#7ec8a4;color:#7ec8a4;background:rgba(126,200,164,.08);">👨‍⚕️ تواجد</button>
      <button class="s-btn" data-type="call24"   style="border-color:#4ecdc4;color:#4ecdc4;background:rgba(78,205,196,.08);">📞 كول 24س</button>
    </div>
    <div class="note-row"><label>ملاحظة (اختياري)</label><textarea id="day-note" placeholder="مثال: تبديل مع د. أحمد..."></textarea></div>
    <div class="s-actions">
      <button class="btn-danger" onclick="clearDay()">🗑 مسح اليوم</button>
      <button class="btn-ok"     onclick="closeOverlay('day-ov')">✓ تم</button>
    </div>
  </div>
</div>

<!-- MONTH PICKER -->
<div class="overlay" id="mo-ov" onclick="bgClose(event,'mo-ov')">
  <div class="sheet">
    <div class="s-handle"></div>
    <div class="s-sec">اختر الشهر والسنة</div>
    <div class="yr-nav">
      <button class="yr-btn" onclick="changeYear(-1)">‹</button>
      <div class="yr-num" id="yr-num">2025</div>
      <button class="yr-btn" onclick="changeYear(1)">›</button>
    </div>
    <div class="mp-grid" id="mp-grid"></div>
    <div class="s-actions"><button class="btn-ok" onclick="closeOverlay('mo-ov')">✓ تم</button></div>
  </div>
</div>

<!-- EXPORT LOADING -->
<div id="exp-load">
  <div class="spin"></div>
  <div class="spin-lbl">جاري إنشاء صورة الشهر…</div>
</div>

<div id="toast"></div>

<script>
/* THEME */
let isDark = localStorage.getItem('kafya_theme') !== 'light';
function applyTheme(){
  document.body.classList.toggle('light',!isDark);
  document.getElementById('tog-icon').textContent = isDark?'🌙':'☀️';
  document.querySelector('meta[name=theme-color]').content = isDark?'#0f1117':'#f0f4f8';
  localStorage.setItem('kafya_theme', isDark?'dark':'light');
}
function toggleTheme(){ isDark=!isDark; applyTheme(); }
applyTheme();

/* DATA */
const LS='shiftCalendar_v1';
let shifts={};
let vY,vM,pY,editKey=null;
const SD={
  'er-am':   {label:'طوارئ صباحي',short:'صباحي', color:'#60b8e8',icon:'🌅'},
  'er-pm':   {label:'طوارئ عصري', short:'عصري',  color:'#ff8c69',icon:'🌇'},
  'er-night':{label:'طوارئ نايت', short:'نايت',  color:'#a78bfa',icon:'🌙'},
  'consult': {label:'استشارية',   short:'استشاري',color:'#f5c97a',icon:'🩺'},
  'present': {label:'تواجد',      short:'تواجد',  color:'#7ec8a4',icon:'👨\u200d⚕️'},
  'call24':  {label:'كول 24 ساعة',short:'كول24', color:'#4ecdc4',icon:'📞'},
};
function persist(){localStorage.setItem(LS,JSON.stringify(shifts));}
function load(){try{const d=localStorage.getItem(LS);if(d)shifts=JSON.parse(d);}catch(e){}}
load();
const T=new Date();
vY=T.getFullYear(); vM=T.getMonth(); pY=vY;
const MA=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
const WA=['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
function dk(y,m,d){return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}` ;}
function isToday(y,m,d){return T.getFullYear()===y&&T.getMonth()===m&&T.getDate()===d;}

/* RENDER */
function render(){
  document.getElementById('month-lbl').textContent=`${MA[vM]} ${vY}`;
  const cal=document.getElementById('cal');
  cal.innerHTML='';
  const first=new Date(vY,vM,1);
  const days=new Date(vY,vM+1,0).getDate();
  const off=(first.getDay()+1)%7;
  for(let i=0;i<off;i++){const e=document.createElement('div');e.className='day-cell empty';cal.appendChild(e);}
  for(let d=1;d<=days;d++){
    const cell=document.createElement('div');cell.className='day-cell';
    const k=dk(vY,vM,d);
    const sl=shifts[k]||[];
    const wd=new Date(vY,vM,d).getDay();
    const we=(wd===5||wd===6);
    if(isToday(vY,vM,d))cell.classList.add('today');
    if(we)cell.classList.add('weekend');
    if(sl.length)cell.classList.add('has-shift');
    let h=`<div class="day-num">${d}</div>`;
    sl.slice(0,3).forEach(s=>{
      const def=SD[s.type];if(!def)return;
      h+=`<div class="s-tag" style="background:${def.color}38;color:${def.color};border:1px solid ${def.color}55;">${def.short}</div>`;
    });
    if(sl.length>3)h+=`<div class="s-tag" style="background:rgba(90,104,144,.2);color:var(--tx2);">+${sl.length-3}</div>`;
    cell.innerHTML=h;
    cell.onclick=()=>openDay(k,d);
    cal.appendChild(cell);
  }
  renderStats();
}

function renderStats(){
  const bar=document.getElementById('stats-bar');
  const counts={};
  const pre=`${vY}-${String(vM+1).padStart(2,'0')}`;
  Object.keys(shifts).forEach(k=>{if(k.startsWith(pre))shifts[k].forEach(s=>{counts[s.type]=(counts[s.type]||0)+1;});});
  const total=Object.values(counts).reduce((a,b)=>a+b,0);
  if(!total){bar.innerHTML=`<div style="color:var(--tx3);font-size:10px;font-weight:600;padding:3px 8px;">اضغط أي يوم لإضافة خفارة</div>`;return;}
  let h=`<div class="stat-pill" style="border-color:var(--cream);background:var(--lcream);color:var(--cream);"><span class="stat-num">${total}</span> إجمالي</div>`;
  Object.entries(counts).sort((a,b)=>b[1]-a[1]).forEach(([type,n])=>{
    const def=SD[type];if(!def)return;
    h+=`<div class="stat-pill" style="border-color:${def.color};background:${def.color}22;color:${def.color};"><span class="stat-num">${n}</span> ${def.short}</div>`;
  });
  bar.innerHTML=h;
}

/* NAV */
function changeMonth(d){vM+=d;if(vM>11){vM=0;vY++;}if(vM<0){vM=11;vY--;}render();}
function goToday(){vY=T.getFullYear();vM=T.getMonth();render();toast('📅 اليوم');}
function openPicker(){pY=vY;renderPicker();document.getElementById('mo-ov').classList.add('open');}
function changeYear(d){pY+=d;renderPicker();}
function renderPicker(){
  document.getElementById('yr-num').textContent=pY;
  document.getElementById('mp-grid').innerHTML=MA.map((m,i)=>{
    const c=(i===vM&&pY===vY)?'cur':'';
    return `<button class="mp-btn ${c}" onclick="pickMonth(${i})">${m}</button>`;
  }).join('');
}
function pickMonth(m){vM=m;vY=pY;render();closeOverlay('mo-ov');}

/* DAY EDIT */
function openDay(key,d){
  editKey=key;
  const date=new Date(vY,vM,d);
  document.getElementById('sd-n').textContent=d;
  document.getElementById('sd-mo').textContent=MA[vM].slice(0,3);
  document.getElementById('sd-wd').textContent=WA[date.getDay()];
  document.getElementById('sd-dt').textContent=`${d} ${MA[vM]} ${vY}`;
  renderCurShifts();
  document.querySelectorAll('#shift-grid .s-btn').forEach(b=>{b.onclick=()=>addShift(b.dataset.type);});
  document.getElementById('day-note').value='';
  document.getElementById('day-ov').classList.add('open');
}
function renderCurShifts(){
  const w=document.getElementById('cur-shifts');
  const list=shifts[editKey]||[];
  if(!list.length){w.innerHTML=`<div style="color:var(--tx3);font-size:11px;padding:4px 0;">لا خفارات — أضف من الأسفل</div>`;return;}
  w.innerHTML=list.map((s,i)=>{
    const def=SD[s.type];
    return `<div class="s-row">
      <div class="s-dot" style="background:${def.color};"></div>
      <div class="s-rinfo"><div class="s-rname">${def.icon} ${def.label}</div>${s.note?`<div class="s-rnote">📝 ${s.note}</div>`:''}</div>
      <button class="s-rdel" onclick="removeShift(${i})">×</button>
    </div>`;
  }).join('');
}
function addShift(type){
  if(!shifts[editKey])shifts[editKey]=[];
  if(shifts[editKey].some(s=>s.type===type)){toast('⚠️ مضافة مسبقاً');return;}
  const note=document.getElementById('day-note').value.trim();
  shifts[editKey].push({type,note});
  document.getElementById('day-note').value='';
  persist();renderCurShifts();render();
  toast(`✅ ${SD[type].label}`);
}
function removeShift(i){
  shifts[editKey].splice(i,1);
  if(!shifts[editKey].length)delete shifts[editKey];
  persist();renderCurShifts();render();
}
function clearDay(){
  if(!shifts[editKey]?.length){toast('لا شيء لمسحه');return;}
  if(!confirm('مسح جميع خفارات هذا اليوم؟'))return;
  delete shifts[editKey];persist();renderCurShifts();render();toast('🗑 تم');
}

async function exportImage(){
  const loading=document.getElementById('exp-load');
  loading.classList.add('show');
  await new Promise(r=>setTimeout(r,100));
  try{
    const light=!isDark;
    const C={
      bg:     light?'#f0f4f8':'#0f1117',
      bg2:    light?'#e8edf5':'#1f2437',
      card:   light?'#ffffff':'#1c2133',
      border: light?'#cbd5e8':'#2d3553',
      tx:     light?'#1a2040':'#e8eaf6',
      tx2:    light?'#4a5580':'#9aa5cc',
      tx3:    light?'#8a95b8':'#5a6890',
      cream:  light?'#b86800':'#f5c97a',
      cream2: light?'#904e00':'#e8a84a',
      we:     light?'#e0e8f5':'#1f2437',
    };

    const W=920, PAD=18, GAP=5;
    const COLS=7;
    const cellW=Math.floor((W-PAD*2-GAP*(COLS-1))/COLS);
    const cellH=108;

    const first=new Date(vY,vM,1);
    const days=new Date(vY,vM+1,0).getDate();
    const off=(first.getDay()+1)%7;
    const ROWS=Math.ceil((off+days)/7);

    const LOGO_H=70, TITLE_H=60, WD_H=28, LEGEND_H=52;
    const GRID_H=ROWS*cellH+(ROWS-1)*GAP;
    const TOTAL_H=PAD+LOGO_H+TITLE_H+WD_H+GRID_H+LEGEND_H+PAD*2;

    const cv=document.createElement('canvas');
    cv.width=W; cv.height=TOTAL_H;
    const cx=cv.getContext('2d');
    cx.fillStyle=C.bg; cx.fillRect(0,0,W,TOTAL_H);

    function rr(x,y,w,h,r,fill,stroke,lw){
      cx.beginPath();
      cx.moveTo(x+r,y);cx.lineTo(x+w-r,y);cx.arcTo(x+w,y,x+w,y+r,r);
      cx.lineTo(x+w,y+h-r);cx.arcTo(x+w,y+h,x+w-r,y+h,r);
      cx.lineTo(x+r,y+h);cx.arcTo(x,y+h,x,y+h-r,r);
      cx.lineTo(x,y+r);cx.arcTo(x,y,x+r,y,r);cx.closePath();
      if(fill){cx.fillStyle=fill;cx.fill();}
      if(stroke){cx.strokeStyle=stroke;cx.lineWidth=lw||1.5;cx.stroke();}
    }

    let yy=PAD;

    // ── DRAW LOGO on canvas ──
    // Background pill for logo
    const logoBoxW = 300, logoBoxH = 62, logoBoxX = W - PAD - logoBoxW, logoBoxY = yy;
    rr(logoBoxX, logoBoxY, logoBoxW, logoBoxH, 10, '#0b0f1a');

    // + capsule
    const capX = logoBoxX + 10, capY = logoBoxY + 13, capW = 38, capH = 36;
    rr(capX, capY, capW, capH, 18, '#f5c97a');
    // Plus bars
    cx.fillStyle = '#0b0f1a';
    cx.beginPath(); cx.roundRect(capX+9, capY+15, 20, 5, 2.5); cx.fill();
    cx.beginPath(); cx.roundRect(capX+16.5, capY+8, 5, 20, 2.5); cx.fill();

    // Main name
    cx.font = '800 30px Tajawal,Tahoma,Arial';
    cx.fillStyle = '#ffffff';
    cx.textAlign = 'right';
    cx.fillText('الكافية', logoBoxX + logoBoxW - 14, logoBoxY + 38);

    // Subtitle
    cx.font = '400 13px Tajawal,Tahoma,Arial';
    cx.fillStyle = '#5d8fad';
    cx.fillText('في يدك العلم، داخل المستشفى', logoBoxX + logoBoxW - 14, logoBoxY + 56);

    // "جدول الخفارات" on left side
    cx.font = '700 15px Tajawal,Tahoma,Arial';
    cx.fillStyle = C.tx2;
    cx.textAlign = 'left';
    cx.fillText('جدول الخفارات', PAD, logoBoxY + 38);

    yy += LOGO_H;

    // MONTH TITLE
    cx.textAlign='center';
    cx.font='900 40px Tajawal,Arial';cx.fillStyle=C.cream;
    cx.fillText(`${MA[vM]} ${vY}`,W/2,yy+44);
    yy+=TITLE_H;

    // WEEKDAY HEADERS
    const DAYS=['السبت','الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة'];
    cx.font='800 13px Tajawal,Arial';cx.textAlign='center';
    for(let c=0;c<7;c++){
      const x=PAD+c*(cellW+GAP)+cellW/2;
      cx.fillStyle=(c===0||c===6)?C.cream:C.tx3;
      cx.fillText(DAYS[c],x,yy+20);
    }
    yy+=WD_H;

    // CELLS
    for(let row=0;row<ROWS;row++){
      for(let col=0;col<7;col++){
        const idx=row*7+col;
        const d=idx-off+1;
        if(d<1||d>days)continue;
        const cx2=PAD+col*(cellW+GAP);
        const cy2=yy+row*(cellH+GAP);
        const k=dk(vY,vM,d);
        const sl=shifts[k]||[];
        const wd2=new Date(vY,vM,d).getDay();
        const we=(wd2===5||wd2===6);
        const tod=isToday(vY,vM,d);
        const cbg=tod?C.cream+'22':we?C.we:C.card;
        rr(cx2,cy2,cellW,cellH,10,cbg,tod?C.cream:sl.length?C.tx2:C.border,tod?2.5:1.2);
        cx.font=`800 18px Tajawal,Arial`;cx.textAlign='center';
        cx.fillStyle=tod||we?C.cream:C.tx;
        cx.fillText(d,cx2+cellW/2,cy2+24);
        sl.slice(0,3).forEach((s,i)=>{
          const def=SD[s.type];if(!def)return;
          const sc=def.color;
          const ty=cy2+32+i*24;
          const tw=cellW-10;
          rr(cx2+5,ty,tw,20,5,sc+'42');
          // border stroke
          cx.strokeStyle=sc+'80';cx.lineWidth=1;
          cx.beginPath();cx.roundRect(cx2+5,ty,tw,20,5);cx.stroke();
          cx.font='800 11px Tajawal,Arial';cx.fillStyle=sc;cx.textAlign='center';
          cx.fillText(def.short,cx2+cellW/2,ty+14);
        });
      }
    }
    yy+=ROWS*(cellH+GAP)+8;

    // LEGEND
    const LDEFS=[
      {type:'er-am',label:'طوارئ صباحي'},
      {type:'er-pm',label:'طوارئ عصري'},
      {type:'er-night',label:'طوارئ نايت'},
      {type:'consult',label:'استشارية'},
      {type:'present',label:'تواجد'},
      {type:'call24',label:'كول 24 ساعة'},
    ];
    const lw2=128,lh2=30,lg2=6;
    const ltotal=LDEFS.length*(lw2+lg2)-lg2;
    let lx=(W-ltotal)/2;
    LDEFS.forEach(({type,label})=>{
      const sc=SD[type].color;
      rr(lx,yy,lw2,lh2,8,C.bg2,C.border,1);
      cx.fillStyle=sc;
      cx.beginPath();cx.roundRect(lx+lw2-20,yy+9,12,12,3);cx.fill();
      cx.font='700 11px Tajawal,Arial';cx.fillStyle=C.tx2;cx.textAlign='right';
      cx.fillText(label,lx+lw2-32,yy+20);
      lx+=lw2+lg2;
    });

    const a=document.createElement('a');
    a.download=`خفارات_${MA[vM]}_${vY}.png`;
    a.href=cv.toDataURL('image/png');
    a.click();
    toast('🖼️ تم تصدير الصورة');
  }catch(e){console.error(e);toast('❌ خطأ');}
  loading.classList.remove('show');
}

/* HELPERS */
function closeOverlay(id){document.getElementById(id).classList.remove('open');}
function bgClose(e,id){if(e.target===document.getElementById(id))closeOverlay(id);}
let tt;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>el.classList.remove('show'),2200);}

render();

/* PWA Service Worker */
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  });
}
</script>
</body>
